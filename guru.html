<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Nilai | e-Rapor Online</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; vertical-align: top; }
        th { background-color: #d1ecf1; font-size: 0.9em; }
        input[type="number"] { width: 70px; padding: 8px; text-align: center; font-weight: bold; border: 1px solid #ccc; border-radius: 4px; }
        textarea { width: 100%; height: 60px; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; resize: vertical; }
        .success-msg { color: green; font-weight: bold; }
        .error-msg { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1000px;"> <div class="header">
            <h2>📝 Input Nilai & Deskripsi Kurikulum Merdeka</h2>
            <a href="dashboard.html"><button>Kembali ke Dashboard</button></a>
        </div>

        <div class="card" style="text-align: left; background: #fff; border: 1px solid #ddd; margin-bottom: 20px;">
            <label><strong>Pilih Mata Pelajaran:</strong></label>
            <select id="mapel" style="width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ccc; border-radius: 4px; font-weight: bold;">
                <option value="Pendidikan Agama">Pendidikan Agama</option>
                <option value="Pancasila">Pendidikan Pancasila</option>
                <option value="Bahasa Indonesia">Bahasa Indonesia</option>
                <option value="Matematika">Matematika</option>
                <option value="IPA">Ilmu Pengetahuan Alam (IPA)</option>
                <option value="IPS">Ilmu Pengetahuan Sosial (IPS)</option>
                <option value="Bahasa Inggris">Bahasa Inggris</option>
                <option value="PJOK">PJOK</option>
            </select>
        </div>
        
        <p id="pesan-sistem" style="text-align: center; height: 20px;"></p>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th width="20%">Nama Siswa</th>
                        <th width="10%">Nilai Akhir</th>
                        <th width="30%">Capaian Tertinggi<br><small>(TP yang meningkat)</small></th>
                        <th width="30%">Capaian Terendah<br><small>(TP perlu peningkatan)</small></th>
                        <th width="10%">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabel-siswa">
                    <tr><td colspan="5">Memuat data siswa...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { supabase, checkSession } from './app.js'

        let guruId = null;

        // 1. Verifikasi Guru
        async function initGuru() {
            const session = await checkSession()
            if (!session) return window.location.href = 'index.html'

            guruId = session.user.id;
            const { data } = await supabase.from('profiles').select('roles').eq('id', guruId).single()

            if (!data || !data.roles.includes('guru')) {
                alert("Akses ditolak. Halaman ini khusus Guru.")
                window.location.href = 'dashboard.html'
            } else {
                loadSiswa()
            }
        }

        // 2. Tarik daftar siswa
        async function loadSiswa() {
            const tbody = document.getElementById('tabel-siswa')
            const { data, error } = await supabase.from('siswa').select('*').order('nama_lengkap', { ascending: true })
            
            if (error || !data.length) {
                tbody.innerHTML = '<tr><td colspan="5">Belum ada data siswa. Minta Admin untuk menambahkan.</td></tr>'
                return
            }

            tbody.innerHTML = ''
            
            data.forEach(siswa => {
                const tr = document.createElement('tr')
                tr.innerHTML = `
                    <td style="text-align: left;"><strong>${siswa.nama_lengkap}</strong><br><small>NISN: ${siswa.nisn}</small></td>
                    <td><input type="number" id="nilai_${siswa.id}" value="0" min="0" max="100"></td>
                    <td><textarea id="tp_naik_${siswa.id}" placeholder="Menunjukkan penguasaan yang sangat baik dalam..."></textarea></td>
                    <td><textarea id="tp_turun_${siswa.id}" placeholder="Perlu pendampingan dalam hal..."></textarea></td>
                    <td>
                        <button onclick="simpanNilai('${siswa.id}', '${siswa.nama_lengkap}')" style="background-color: #28a745; width: 100%; margin-top: 10px;">Simpan</button>
                    </td>
                `
                tbody.appendChild(tr)
            })
        }

        // 3. Fungsi Simpan Nilai ke Supabase
        window.simpanNilai = async (siswaId, namaSiswa) => {
            const mapel = document.getElementById('mapel').value
            const nilaiAkhir = document.getElementById(`nilai_${siswaId}`).value
            const tpNaik = document.getElementById(`tp_naik_${siswaId}`).value
            const tpTurun = document.getElementById(`tp_turun_${siswaId}`).value
            const pesan = document.getElementById('pesan-sistem')

            pesan.className = ''
            pesan.style.color = 'blue'
            pesan.textContent = `Memproses nilai ${namaSiswa}...`

            // Cek apakah data nilai sudah pernah ada
            const { data: existing } = await supabase.from('nilai')
                .select('id')
                .eq('siswa_id', siswaId)
                .eq('mata_pelajaran', mapel)
                .single()

            let dbError;

            if (existing) {
                // Update data jika sudah ada
                const { error } = await supabase.from('nilai')
                    .update({ 
                        nilai_akhir: nilaiAkhir, 
                        tp_meningkat: tpNaik, 
                        tp_perlu_peningkatan: tpTurun,
                        guru_id: guruId 
                    })
                    .eq('id', existing.id)
                dbError = error
            } else {
                // Insert data jika belum ada
                const { error } = await supabase.from('nilai')
                    .insert([{
                        siswa_id: siswaId,
                        guru_id: guruId,
                        mata_pelajaran: mapel,
                        nilai_akhir: nilaiAkhir,
                        tp_meningkat: tpNaik,
                        tp_perlu_peningkatan: tpTurun
                    }])
                dbError = error
            }

            // Notifikasi hasil
            if (dbError) {
                pesan.className = 'error-msg'
                pesan.textContent = "Gagal menyimpan: " + dbError.message
            } else {
                pesan.className = 'success-msg'
                pesan.textContent = `✔ Berhasil menyimpan nilai & deskripsi untuk ${namaSiswa}!`
                setTimeout(() => pesan.textContent = '', 3500)
            }
        }

        // Jalankan saat pertama kali dimuat
        initGuru()
    </script>
</body>
</html>
