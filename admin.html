<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin | e-Rapor Online</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 15px; }
        form { border: 1px solid #ddd; padding: 15px; border-radius: 5px; background: #fafafa; }
        label { font-size: 0.9em; font-weight: bold; }
        input, select { width: 100%; margin-bottom: 15px; padding: 8px; box-sizing: border-box; }
        .btn-submit { background-color: #17a2b8; color: white; width: 100%; padding: 10px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1000px;">
        <div class="header">
            <h2>⚙️ Panel Administrator (Relasional)</h2>
            <a href="dashboard.html"><button>Kembali ke Dashboard</button></a>
        </div>

        <div class="card" style="text-align: left; background: #fff; border: 1px solid #ddd; margin-bottom: 20px;">
            <h3>Atur Role Pengguna</h3>
            <form id="form-role">
                <select id="select-user" required><option value="">Memuat data...</option></select>
                <select id="select-role" required>
                    <option value="guru">Guru Mapel</option>
                    <option value="wali_kelas">Wali Kelas</option>
                    <option value="admin">Administrator</option>
                </select>
                <button type="submit" class="btn-submit" style="background-color: #28a745;">Update Role</button>
            </form>
        </div>

        <h3>📦 Kelola Master Data SQL</h3>
        <div class="grid-3">
            <form id="form-tapel">
                <label>Tahun Ajaran Baru</label>
                <input type="text" id="nama_tapel" placeholder="Contoh: 2023/2024" required>
                <label>Semester</label>
                <select id="smt_tapel" required>
                    <option value="1">Ganjil (1)</option>
                    <option value="2">Genap (2)</option>
                </select>
                <button type="submit" class="btn-submit">Simpan Tahun Ajaran</button>
            </form>

            <form id="form-kelas">
                <label>Nama Kelas</label>
                <input type="text" id="nama_kelas" placeholder="Contoh: VII-A" required>
                <label>Tingkat</label>
                <select id="tingkat_kelas" required>
                    <option value="7">Kelas 7</option>
                    <option value="8">Kelas 8</option>
                    <option value="9">Kelas 9</option>
                </select>
                <button type="submit" class="btn-submit">Simpan Kelas</button>
            </form>

            <form id="form-mapel">
                <label>Kode Mapel</label>
                <input type="text" id="kode_mapel" placeholder="Contoh: MTK" required>
                <label>Nama Mapel</label>
                <input type="text" id="nama_mapel" placeholder="Contoh: Matematika" required>
                <button type="submit" class="btn-submit">Simpan Mapel</button>
            </form>
        </div>
        
        <div class="card" style="margin-top: 20px; text-align: left; background: #fff; border: 1px solid #ddd;">
            <h3>Tambah Siswa Baru</h3>
            <form id="form-siswa">
                <input type="text" id="nisn" placeholder="NISN Siswa" required>
                <input type="text" id="nama_siswa" placeholder="Nama Lengkap Siswa" required>
                <select id="jk_siswa" required>
                    <option value="L">Laki-laki (L)</option>
                    <option value="P">Perempuan (P)</option>
                </select>
                <button type="submit" class="btn-submit" style="background-color: #0056b3;">Simpan Data Siswa</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { supabase, checkSession } from './app.js'

        async function init() {
            const session = await checkSession()
            if (!session) return window.location.href = 'index.html'
            loadUsers()
        }

        async function loadUsers() {
            const selectUser = document.getElementById('select-user')
            const { data } = await supabase.from('profiles').select('id, full_name, roles')
            if (data) {
                selectUser.innerHTML = '<option value="">-- Pilih Pengguna --</option>'
                data.forEach(user => selectUser.innerHTML += `<option value="${user.id}">${user.full_name} (${user.roles.join(', ')})</option>`)
            }
        }

        // Simpan Role
        document.getElementById('form-role').addEventListener('submit', async (e) => {
            e.preventDefault()
            const id = document.getElementById('select-user').value
            const role = document.getElementById('select-role').value
            const { error } = await supabase.from('profiles').update({ roles: [role] }).eq('id', id)
            if (error) alert("Error: " + error.message)
            else { alert("✅ Role diupdate!"); loadUsers() }
        })

        // Simpan Tahun Ajaran (sesuai SQL)
        document.getElementById('form-tapel').addEventListener('submit', async (e) => {
            e.preventDefault()
            const { error } = await supabase.from('tahun_ajaran').insert([{
                nama: document.getElementById('nama_tapel').value,
                semester: document.getElementById('smt_tapel').value,
                is_active: true
            }])
            if (error) alert("Error: " + error.message); else { alert("✅ Berhasil!"); e.target.reset() }
        })

        // Simpan Kelas (sesuai SQL)
        document.getElementById('form-kelas').addEventListener('submit', async (e) => {
            e.preventDefault()
            const { error } = await supabase.from('kelas').insert([{
                nama_kelas: document.getElementById('nama_kelas').value,
                tingkat: document.getElementById('tingkat_kelas').value
            }])
            if (error) alert("Error: " + error.message); else { alert("✅ Berhasil!"); e.target.reset() }
        })

        // Simpan Mapel (sesuai SQL)
        document.getElementById('form-mapel').addEventListener('submit', async (e) => {
            e.preventDefault()
            const { error } = await supabase.from('mata_pelajaran').insert([{
                kode_mapel: document.getElementById('kode_mapel').value,
                nama_mapel: document.getElementById('nama_mapel').value
            }])
            if (error) alert("Error: " + error.message); else { alert("✅ Berhasil!"); e.target.reset() }
        })

        // Simpan Siswa (Sesuai SQL tabel 'siswa')
        document.getElementById('form-siswa').addEventListener('submit', async (e) => {
            e.preventDefault()
            const { error } = await supabase.from('siswa').insert([{
                nisn: document.getElementById('nisn').value,
                nama_lengkap: document.getElementById('nama_siswa').value,
                jenis_kelamin: document.getElementById('jk_siswa').value
            }])
            if (error) alert("Error: " + error.message); else { alert("✅ Berhasil!"); e.target.reset() }
        })

        init()
    </script>
</body>
</html>
