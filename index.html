<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | e-Rapor Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg-color: #f3f4f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --white: #ffffff;
        }

        body {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            display: flex; height: 100vh; justify-content: center; align-items: center;
        }

        .login-container {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            margin: 0; font-size: 1.5rem; color: var(--primary);
        }

        .login-header p {
            margin: 5px 0 0 0; font-size: 0.9rem; color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            font-size: 0.85rem; font-weight: 600; color: var(--text-main);
            display: block; margin-bottom: 8px;
        }

        input[type="email"], input[type="password"], select {
            width: 100%; padding: 12px; border: 1px solid var(--border-color);
            border-radius: 8px; font-size: 0.95rem; font-family: 'Inter', sans-serif;
            background: #f9fafb; transition: 0.2s; box-sizing: border-box;
        }

        input:focus, select:focus {
            border-color: var(--primary); outline: 0; background: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-login {
            width: 100%; padding: 12px; background-color: var(--primary);
            color: white; border: none; border-radius: 8px; cursor: pointer;
            font-weight: 600; font-size: 1rem; font-family: 'Inter', sans-serif;
            transition: all 0.2s; margin-top: 10px;
        }

        .btn-login:hover { background-color: var(--primary-dark); transform: translateY(-1px); }
        .btn-login:disabled { background-color: #93c5fd; cursor: not-allowed; transform: none; }

    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h1>e-Rapor Online</h1>
            <p>Silakan masuk menggunakan akun Anda</p>
        </div>

        <form id="form-login">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="nama@sekolah.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="login_tapel">Pilih Tahun Ajaran & Semester</label>
                <select id="login_tapel" required>
                    <option value="">⏳ Memuat data dari server...</option>
                </select>
            </div>

            <button type="submit" id="btn-login" class="btn-login">Masuk ke Sistem</button>
        </form>
    </div>

    <script type="module">
        import { supabase } from './app.js' // Pastikan file app.js Anda ada di folder yang sama

        // 1. Fungsi untuk menarik data Tahun Ajaran ke Dropdown
        async function loadTapelLogin() {
            // Urutkan dari yang paling baru (ID terbesar)
            const { data, error } = await supabase.from('tahun_ajaran').select('*').order('id', { ascending: false });
            
            const selectTapel = document.getElementById('login_tapel');
            
            if (data && data.length > 0) {
                selectTapel.innerHTML = ''; // Kosongkan tulisan "Memuat..."
                
                data.forEach(t => {
                    let namaSemester = t.semester == '1' ? 'Ganjil' : 'Genap';
                    selectTapel.innerHTML += `<option value="${t.id}">${t.nama} - Semester ${namaSemester}</option>`;
                });
            } else {
                selectTapel.innerHTML = '<option value="">(Belum ada data Tahun Ajaran)</option>';
            }
        }

        // Jalankan fungsi load data saat halaman dibuka
        loadTapelLogin();

        // 2. Fungsi Proses Login
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btn-login');
            btn.textContent = 'Memeriksa Akun...';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const tapelDropdown = document.getElementById('login_tapel');
            
            const selectedTapelId = tapelDropdown.value;
            const selectedTapelText = tapelDropdown.options[tapelDropdown.selectedIndex]?.text;

            // Pastikan Tahun Ajaran sudah dipilih
            if (!selectedTapelId) {
                alert("⚠️ Sistem tidak mendeteksi Tahun Ajaran. Hubungi Admin.");
                btn.textContent = 'Masuk ke Sistem';
                btn.disabled = false;
                return;
            }

            // Eksekusi Login dengan Supabase
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                alert("❌ Login Gagal: Email atau Password salah.");
                btn.textContent = 'Masuk ke Sistem';
                btn.disabled = false;
            } else {
                // LOGIN BERHASIL: Simpan pilihan semester ke "Ingatan Browser" (Local Storage)
                localStorage.setItem('aktif_tapel_id', selectedTapelId);
                localStorage.setItem('aktif_tapel_nama', selectedTapelText);

                // Cek Jabatan (Role) untuk menentukan dia masuk ke Panel Admin atau Guru
                const { data: profile } = await supabase.from('profiles').select('roles').eq('id', data.user.id).single();
                
                if (profile && profile.roles && profile.roles.includes('admin')) {
                    // Jika dia admin, arahkan ke admin.html
                    window.location.replace('admin.html');
                } else {
                    // Jika guru/wali kelas/dll, arahkan ke guru.html
                    window.location.replace('guru.html');
                }
            }
        });
    </script>
</body>
</html>
