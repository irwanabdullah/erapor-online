<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | e-Rapor Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <h2 style="text-align: center;">Masuk e-Rapor</h2>
        <p id="error-msg" style="color: red; text-align: center;"></p>
        
        <form id="login-form">
            <label>Email Sekolah</label>
            <input type="email" id="email" required>
            <label>Password</label>
            <input type="password" id="password" required>
            <button type="submit" style="width: 100%; margin-top: 10px;">Login</button>
        </form>
    </div>

    <script type="module">
        import { supabase, checkSession } from './app.js'

        // Jika sudah login, langsung lempar ke dashboard
        checkSession().then(session => {
            if(session) window.location.href = 'dashboard.html'
        })

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault()
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            const btn = e.target.querySelector('button')
            
            btn.textContent = 'Memproses...'
            const { data, error } = await supabase.auth.signInWithPassword({ email, password })
            
            if (error) {
                document.getElementById('error-msg').textContent = "Login gagal: " + error.message
                btn.textContent = 'Login'
            } else {
                window.location.href = 'dashboard.html'
            }
        })
    </script>
</body>
</html>
